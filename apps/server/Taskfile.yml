version: "3"

dotenv: [".env"]

vars:
  CAMPUS_CART_DB_DSN: '{{.CAMPUS_CART_DB_DSN | default ""}}'

tasks:
  help:
    desc: print this help message
    cmds:
      - task --list-all
    silent: true

  confirm:
    desc: confirmation prompt
    prompt: Are you sure you want to continue?
    internal: true

  run:
    desc: run the cmd/campusCart application
    cmds:
      - go run ./cmd/campusCart

  migrations:new:
    desc: create a new database migration
    vars:
      NAME: '{{.name | default ""}}'
    cmds:
      - |
        if [ -z "{{.NAME}}" ]; then
          echo "Error: name parameter is required"
          echo "Usage: task migrations:new name=migration_name"
          exit 1
        fi
      - echo 'Creating migration file for {{.NAME}}...'
      - tern new -m ./internal/database/migrations {{.NAME}}

  migrations:up:
    desc: apply all up database migrations
    deps: [confirm]
    cmds:
      - echo 'Running up migrations...'
      - tern migrate -m ./internal/database/migrations --conn-string "{{.CAMPUS_CART_DB_DSN}}"

  migrations:down:
    desc: rollback all database migrations
    deps: [confirm]
    cmds:
      - echo 'Rolling back all migrations...'
      - tern migrate -m ./internal/database/migrations --conn-string "{{.CAMPUS_CART_DB_DSN}}" -d 0

  tidy:
    desc: format all .go files, and tidy and vendor module dependencies
    cmds:
      - echo 'Formatting .go files...'
      - go fmt ./...
      - echo 'Tidying module dependencies...'
      - go mod tidy
      - echo 'Verifying dependencies...'
      - go mod verify
